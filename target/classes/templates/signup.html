<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/css/shopsphere-premium.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark premium-navbar fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <span class="brand-icon"><i class="bi bi-bag-check-fill"></i></span>
        <span>ShopSphere</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link " href="/"><i class="bi bi-house-door me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link " href="/user/userDashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link " href="/user/view-products"><i class="bi bi-grid me-1"></i>Products</a></li>
          <li class="nav-item"><a class="nav-link " href="/user/view-orders"><i class="bi bi-receipt me-1"></i>Orders</a></li>
          <li class="nav-item"><a class="nav-link " href="/user/cartView"><i class="bi bi-cart3 me-1"></i>Cart</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="auth-page">
    <div class="container">
      <div class="auth-card" data-aos="zoom-in">
        <span class="eyebrow"><i class="bi bi-person-plus"></i> Create Account</span>
        <h1 class="h2 fw-bold mt-3 mb-2">Join ShopSphere</h1>
        <p class="muted mb-4">Create your account and start shopping with a polished dashboard.</p>
        <p class="message-chip" th:if="${msg}" th:text="${msg}">Message</p>
        <form method="post" action="/auth/register">
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" placeholder="Full Name" required></div>
            <div class="col-12"><label class="form-label">Email</label><input type="email" name="email" class="form-control" placeholder="Email" required></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" maxlength="10" min="10" class="form-control" placeholder="Phone" required></div>
            <div class="col-md-6"><label class="form-label">Age</label><input type="number" name="age" class="form-control" placeholder="Age" required></div>
            <div class="col-12"><label class="form-label">Address</label><input type="text" name="address" class="form-control" placeholder="Address" required></div>
            <div class="col-12"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="Password" required></div>
          </div>
          <button type="submit" class="btn btn-premium w-100 mt-4"><i class="bi bi-check2-circle me-2"></i>Register</button>
        </form>
        <div class="text-center mt-4"><a href="/auth/login" class="text-info fw-semibold">Already have an account? Login</a></div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="/js/shopsphere-premium.js"></script>
</body>
</html>
