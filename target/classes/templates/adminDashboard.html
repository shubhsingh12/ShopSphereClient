<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/css/shopsphere-premium.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar-shell">
    <aside class="premium-sidebar">
      <a class="navbar-brand d-flex align-items-center mb-4" href="/"><span class="brand-icon"><i class="bi bi-bag-check-fill"></i></span><span>ShopSphere Admin</span></a>
      <a class="sidebar-link active" href="/auth/dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="sidebar-link" href="/admin/add-product"><i class="bi bi-plus-circle"></i>Add Product</a>
      <a class="sidebar-link" href="/admin/view-products"><i class="bi bi-box-seam"></i>View Products</a>
      <a class="sidebar-link" href="/admin/users"><i class="bi bi-people"></i>Manage Users</a>
      <a class="sidebar-link" href="/"><i class="bi bi-house-door"></i>Home</a>
    </aside>
    <main class="p-4 p-lg-5">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-5" data-aos="fade-up">
        <div>
          <span class="eyebrow"><i class="bi bi-command"></i> Admin Workspace</span>
          <h1 class="h2 fw-bold mt-2">Welcome, <span class="text-warning" th:text="${username}">User</span></h1>
        </div>
        <form action="/auth/logout" method="post"><button class="btn btn-danger-premium px-4"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></form>
      </div>
      <div class="row g-4">
        <div class="col-md-6 col-xl-3" data-aos="fade-up"><div class="metric-card"><i class="bi bi-box-seam"></i><h3 class="h5 mt-3">Product Management</h3><p class="muted mb-0">Add, edit, and remove store products.</p></div></div>
        <div class="col-md-6 col-xl-3" data-aos="fade-up" data-aos-delay="100"><div class="metric-card"><i class="bi bi-people"></i><h3 class="h5 mt-3">User Management</h3><p class="muted mb-0">View and manage registered users.</p></div></div>
        <div class="col-md-6 col-xl-3" data-aos="fade-up" data-aos-delay="200"><div class="metric-card"><i class="bi bi-receipt"></i><h3 class="h5 mt-3">Orders</h3><p class="muted mb-0">Track customer purchase activity.</p></div></div>
        <div class="col-md-6 col-xl-3" data-aos="fade-up" data-aos-delay="300"><div class="metric-card"><i class="bi bi-graph-up-arrow"></i><h3 class="h5 mt-3">Analytics</h3><p class="muted mb-0">Monitor shop performance.</p></div></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="/js/shopsphere-premium.js"></script>
</body>
</html>
