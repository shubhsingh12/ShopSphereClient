<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Product - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/css/shopsphere-premium.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark premium-navbar fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <span class="brand-icon"><i class="bi bi-bag-check-fill"></i></span>
        <span>ShopSphere</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link " href="/"><i class="bi bi-house-door me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link " href="/auth/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="/admin/add-product"><i class="bi bi-plus-circle me-1"></i>Add Product</a></li>
          <li class="nav-item"><a class="nav-link " href="/admin/view-products"><i class="bi bi-box-seam me-1"></i>Products</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <header class="hero-band">
    <div class="container" data-aos="fade-up">
      <span class="eyebrow"><i class="bi bi-cloud-arrow-up"></i> Admin Catalog</span>
      <h1 class="hero-title mt-3">Upload Product</h1>
      <p class="hero-copy">Add product name, description, price, stock, and a high-quality image for the ShopSphere catalog.</p>
    </div>
  </header>
  <main class="page-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="premium-card" data-aos="zoom-in">
            <p class="message-chip" th:if="${msg}" th:text="${msg}">Ready to upload</p>
            <form action="/admin/add-product" method="post" enctype="multipart/form-data">
              <div class="row g-3">
                <div class="col-12"><label class="form-label">Product Name</label><input type="text" name="name" class="form-control" placeholder="Enter product name" required></div>
                <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4" placeholder="Enter product description" required></textarea></div>
                <div class="col-md-6"><label class="form-label">Price</label><input type="number" name="price" class="form-control" min="0" step="0.01" placeholder="0.00" required></div>
                <div class="col-md-6"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" min="0" placeholder="0" required></div>
                <div class="col-12"><label class="form-label">Product Image</label><input type="file" name="img" class="form-control" accept="image/*" required></div>
              </div>
              <button class="btn btn-premium w-100 mt-4"><i class="bi bi-cloud-arrow-up-fill me-2"></i>Upload Product</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer class="premium-footer">
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
        <div><strong>ShopSphere</strong><span class="ms-2">Premium shopping experience</span></div>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/auth/login">Login</a>
          <a href="/auth/register">Register</a>
        </div>
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="/js/shopsphere-premium.js"></script>
</body>
</html>
