<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Products - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/css/shopsphere-premium.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark premium-navbar fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <span class="brand-icon"><i class="bi bi-bag-check-fill"></i></span>
        <span>ShopSphere</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link " href="/"><i class="bi bi-house-door me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link " href="/auth/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link " href="/admin/add-product"><i class="bi bi-plus-circle me-1"></i>Add Product</a></li>
          <li class="nav-item"><a class="nav-link active" href="/admin/view-products"><i class="bi bi-box-seam me-1"></i>Products</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <header class="hero-band">
    <div class="container text-center" data-aos="fade-up">
      <span class="eyebrow"><i class="bi bi-box-seam"></i> Product Control</span>
      <h1 class="hero-title mx-auto mt-3">Explore Products</h1>
      <p class="hero-copy mx-auto">Manage, edit, and monitor your premium product catalog.</p>
      <p class="message-chip d-inline-flex mt-3">Welcome, <span th:text="${msg}">Admin</span></p>
    </div>
  </header>
  <main class="page-section">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-3 col-md-6" th:each="p, stat : ${products}" data-aos="zoom-in" th:attr="data-aos-delay=${stat.index * 80}">
          <article class="product-card h-100">
            <div class="position-relative">
              <img class="product-image" th:src="${p.imageUrl}" alt="Product">
              <span class="badge-soft position-absolute top-0 end-0 m-3">Stock: <span th:text="${p.stock}">10</span></span>
            </div>
            <div class="p-4">
              <h2 class="h5 fw-bold" th:text="${p.name}">Product Name</h2>
              <p class="price mb-2">₹ <span th:text="${p.price}">999</span></p>
              <p class="muted small" th:text="${p.description}">Product Description</p>
              <div class="d-flex gap-2 mt-4">
                <a th:href="@{'/admin/delete/' + ${p.id}}" class="btn btn-danger-premium flex-fill"><i class="bi bi-trash me-1"></i>Delete</a>
                <a th:href="@{'/admin/edit/' + ${p.id}}" class="btn btn-ghost flex-fill"><i class="bi bi-pencil-square me-1"></i>Edit</a>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </main>
  <footer class="premium-footer">
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
        <div><strong>ShopSphere</strong><span class="ms-2">Premium shopping experience</span></div>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/auth/login">Login</a>
          <a href="/auth/register">Register</a>
        </div>
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="/js/shopsphere-premium.js"></script>
</body>
</html>
